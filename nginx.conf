events {
    worker_connections 1024;
}

http {
    # ─────────────────────────────────────────────────────────
    # Load balancing — round-robin sur 3 réplicas API
    # ─────────────────────────────────────────────────────────
    upstream newsops_api {
        least_conn;                    # Route vers le réplica le moins chargé
        server api1:8000 max_fails=3 fail_timeout=30s;
        server api2:8000 max_fails=3 fail_timeout=30s;
        server api3:8000 max_fails=3 fail_timeout=30s;
    }

    # Logs au format JSON pour faciliter l'agrégation
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_time":"$request_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    server {
        listen 80;
        server_name localhost;

        # Timeouts adaptés à l'inférence DistilBERT (CPU ~75-150ms)
        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;

        location / {
            proxy_pass http://newsops_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Réessayer sur un autre réplica si celui-ci échoue
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        # Endpoint santé du load balancer lui-même
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}

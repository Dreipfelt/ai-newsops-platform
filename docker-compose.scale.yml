# ─────────────────────────────────────────────────────────────
# AI NewsOps Platform — Docker Compose (édition scalable)
# 3 réplicas API derrière un load balancer nginx + stack complet
# Usage : docker-compose -f docker-compose.scale.yml up --build
# ─────────────────────────────────────────────────────────────

services:

  # ── Load Balancer ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: newsops-nginx
    ports:
      - "8000:80"                    # Le port public reste 8000, inchangé pour l'existant
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
      api3:
        condition: service_healthy
    networks:
      - monitoring-network
    restart: unless-stopped

  # ── Réplica API #1 ───────────────────────────────────────────
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsops-api-1
    environment:
      MODEL_DIR: /app/models/distilbert/best_model
      DATA_DIR: /app/data/processed
      MAX_LENGTH: "128"
      MODEL_VERSION: "1.0.0"
      REPLICA_ID: "api1"
    volumes:
      - ./models/distilbert/best_model:/app/models/distilbert/best_model:ro
      - ./models/distilbert/training_metrics.json:/app/models/distilbert/training_metrics.json:ro
      - ./data/processed/label_mapping.json:/app/data/processed/label_mapping.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - monitoring-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2G

  # ── Réplica API #2 ───────────────────────────────────────────
  api2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsops-api-2
    environment:
      MODEL_DIR: /app/models/distilbert/best_model
      DATA_DIR: /app/data/processed
      MAX_LENGTH: "128"
      MODEL_VERSION: "1.0.0"
      REPLICA_ID: "api2"
    volumes:
      - ./models/distilbert/best_model:/app/models/distilbert/best_model:ro
      - ./models/distilbert/training_metrics.json:/app/models/distilbert/training_metrics.json:ro
      - ./data/processed/label_mapping.json:/app/data/processed/label_mapping.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - monitoring-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2G

  # ── Réplica API #3 ───────────────────────────────────────────
  api3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsops-api-3
    environment:
      MODEL_DIR: /app/models/distilbert/best_model
      DATA_DIR: /app/data/processed
      MAX_LENGTH: "128"
      MODEL_VERSION: "1.0.0"
      REPLICA_ID: "api3"
    volumes:
      - ./models/distilbert/best_model:/app/models/distilbert/best_model:ro
      - ./models/distilbert/training_metrics.json:/app/models/distilbert/training_metrics.json:ro
      - ./data/processed/label_mapping.json:/app/data/processed/label_mapping.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - monitoring-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2G

  # ── MLflow ────────────────────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    container_name: newsops-mlflow
    command: >
      bash -c "pip install -q mlflow &&
               mlflow server
               --backend-store-uri sqlite:///mlruns/mlflow.db
               --default-artifact-root /mlruns/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    networks:
      - monitoring-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: newsops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    depends_on:
      - api1
      - api2
      - api3
    networks:
      - monitoring-network

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: newsops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - monitoring-network

  # ── Streamlit Dashboard ───────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile.streamlit
    container_name: newsops-dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://nginx:80"
    networks:
      - monitoring-network
    restart: unless-stopped
    depends_on:
      - nginx

networks:
  monitoring-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

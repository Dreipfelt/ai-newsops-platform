name: CD — Deploy

on:
  workflow_run:
    workflows: ["CI — Test & Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs: {}

env:
  IMAGE_NAME: newsops-api

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    # ✅ On vérifie si c'est un succès (automatique) OU un déclenchement manuel
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')

    steps:
      - uses: actions/checkout@v4
        with:
          # ✅ Récupère le bon commit pour un déclenchement manuel
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: |
          echo "📥 Pull de l'image ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy — stop old container
        run: |
          docker stop newsops-api 2>/dev/null || true
          docker rm   newsops-api 2>/dev/null || true

      - name: Deploy — start new container
        run: |
          docker run -d \
            --name newsops-api \
            --restart unless-stopped \
            -p 8000:8000 \
            -e MODEL_DIR=/app/models/distilbert/best_model \
            -e DATA_DIR=/app/data/processed \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Health check post-deploy
        run: |
          echo "⏳ Attente démarrage API (30s)..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check échoué (HTTP $STATUS)"
            docker logs newsops-api
            exit 1
          fi
          echo "✅ API déployée et healthy (HTTP $STATUS)"

      - name: Smoke test — /predict
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"headline": "Congress passes new climate bill", "short_description": "Senate votes in favor."}')
          echo "📤 Réponse : $RESPONSE"
          CATEGORY=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['category'])")
          echo "✅ Catégorie prédite : $CATEGORY"
          if [ -z "$CATEGORY" ]; then
            echo "❌ Smoke test échoué — pas de catégorie retournée"
            exit 1
          fi

      - name: Notify success
        if: success()
        run: |
          echo "🚀 Déploiement réussi !"
          echo "   Commit  : ${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "   Image   : ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"

      - name: Rollback si échec
        if: failure()
        run: |
          echo "⚠️ Déploiement échoué"
          docker logs newsops-api
          exit 1
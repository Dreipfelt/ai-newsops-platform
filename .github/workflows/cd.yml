name: CD - Build, Push & Verify Docker Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔥 ÉTAPE CRUCIALE : Configurer buildx avec le driver docker-container
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container  # Force l'utilisation du driver qui supporte les attestations

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      # 🔥 ÉTAPE MODIFIÉE : Désactivation explicite des attestations
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false   # ← Désactive les attestations de provenance
          sbom: false         # ← Désactive les SBOM

      # 🔥 ÉTAPE SUPPRIMÉE : La vérification d'attestation n'est plus nécessaire
      # Si vous voulez une vérification, utilisez plutôt :
      # - name: Verify Docker image
      #   run: docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --help || true
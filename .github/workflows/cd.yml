name: CD — Image Verification

on:
  workflow_run:
    workflows: ["CI — Test & Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs: {}

env:
  IMAGE_NAME: newsops-api

jobs:
  verify-image:
    name: Verify Docker Image on GHCR
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists on GHCR
        run: |
          echo "🔍 Vérification de l'existence de l'image sur GHCR..."
          
          # Vérifier si l'image existe en la pullant
          if docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest; then
            echo "✅ Image trouvée sur GHCR : ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
            echo "📊 Informations sur l'image :"
            docker images --filter=reference="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
            echo "✅ Vérification terminée avec succès !"
          else
            echo "❌ Image non trouvée sur GHCR."
            exit 1
          fi

      - name: Notify success
        if: success()
        run: |
          echo "🚀 Vérification réussie !"
          echo "   Image   : ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
          echo "   Commit  : ${{ github.event.workflow_run.head_sha || github.sha }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Échec de la vérification de l'image sur GHCR."
          exit 1
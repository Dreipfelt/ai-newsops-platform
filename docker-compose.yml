services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsops-api
    ports:
      - "8000:8000"
    environment:
      MODEL_DIR: /app/models/distilbert/best_model
      DATA_DIR: /app/data/processed
      MAX_LENGTH: "128"
      MODEL_VERSION: "1.0.0"
    volumes:
      - ./models/distilbert/best_model:/app/models/distilbert/best_model:ro
      - ./models/distilbert/training_metrics.json:/app/models/distilbert/training_metrics.json:ro
      - ./data/processed/label_mapping.json:/app/data/processed/label_mapping.json:ro
      - ./monitoring:/app/monitoring
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - monitoring-network

  mlflow:
    image: python:3.10-slim
    container_name: newsops-mlflow
    command: >
      bash -c "pip install -q mlflow &&
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --default-artifact-root /mlruns/artifacts
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    networks:
      - monitoring-network

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile.streamlit
    container_name: newsops-dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - monitoring-network

  prometheus:
    image: prom/prometheus:latest
    container_name: newsops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:latest
    container_name: newsops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
    - grafana_data:/var/lib/grafana
    - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - monitoring-network

  airflow-postgres:
    image: postgres:15
    container_name: newsops-airflow-postgres
    profiles: ["airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - monitoring-network

  airflow-init:
    image: apache/airflow:2.9.3-python3.10
    container_name: newsops-airflow-init
    profiles: ["airflow"]
    depends_on:
      airflow-postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: newsops_airflow_secret_key_dev
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__DAG_PROCESSOR_MANAGER_LOG_LOCATION: /opt/airflow/logs/dag_processor_manager/dag_processor_manager.log
      MLFLOW_TRACKING_URI: http://mlflow:5000
      NEWSOPS_PROJECT_ROOT: /opt/airflow/project
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/plugins:/opt/airflow/plugins:ro
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username airflow
      --password airflow
      --firstname NewsOps
      --lastname Admin
      --role Admin
      --email admin@example.com || true"
    networks:
      - monitoring-network

  airflow-webserver:
    image: apache/airflow:2.9.3-python3.10
    container_name: newsops-airflow-webserver
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__WEBSERVER__SECRET_KEY: newsops_airflow_secret_key_dev
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__DAG_PROCESSOR_MANAGER_LOG_LOCATION: /opt/airflow/logs/dag_processor_manager/dag_processor_manager.log
      MLFLOW_TRACKING_URI: http://mlflow:5000
      NEWSOPS_PROJECT_ROOT: /opt/airflow/project
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/plugins:/opt/airflow/plugins:ro
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command: webserver
    restart: unless-stopped
    networks:
      - monitoring-network

  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.10
    container_name: newsops-airflow-scheduler
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: newsops_airflow_secret_key_dev
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__DAG_PROCESSOR_MANAGER_LOG_LOCATION: /opt/airflow/logs/dag_processor_manager/dag_processor_manager.log
      MLFLOW_TRACKING_URI: http://mlflow:5000
      NEWSOPS_PROJECT_ROOT: /opt/airflow/project
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/plugins:/opt/airflow/plugins:ro
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  airflow_postgres_data:
  airflow_logs:
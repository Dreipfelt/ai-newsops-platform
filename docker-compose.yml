services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsops-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/models/distilbert/best_model
      - DATA_DIR=/app/data/processed
      - MAX_LENGTH=128
      - MODEL_VERSION=1.0.0
    volumes:
      - ./models/distilbert/best_model:/app/models/distilbert/best_model:ro
      - ./models/distilbert/training_metrics.json:/app/models/distilbert/training_metrics.json:ro
      - ./data/processed/label_mapping.json:/app/data/processed/label_mapping.json:ro
      - ./monitoring:/app/monitoring
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - monitoring-network

  mlflow:
    image: python:3.10-slim
    container_name: newsops-mlflow
    command: >
      bash -c "pip install -q mlflow &&
               mlflow server
               --backend-store-uri sqlite:///mlruns/mlflow.db
               --default-artifact-root /mlruns/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    networks:
      - monitoring-network

  prometheus:
    image: prom/prometheus:latest
    container_name: newsops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring-network
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: newsops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    networks:
      - monitoring-network
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: newsops-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)'
    restart: unless-stopped
    networks:
      - monitoring-network

networks:
  monitoring-network:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E402",  # module-import-not-at-top-of-file (nécessaire pour train_cpu.py : set_num_threads avant imports)
    "E501",  # line-too-long (géré par black)
]

[tool.ruff.lint.per-file-ignores]
"src/models/train_cpu.py" = ["E702", "E701"]  # semicolons dans le script d'entraînement

[tool.black]
line-length = 120
target-version = ["py310"]

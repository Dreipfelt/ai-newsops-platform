global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'newsops-monitor'

scrape_configs:
  # API FastAPI
  - job_name: 'newsops-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (métriques système)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']